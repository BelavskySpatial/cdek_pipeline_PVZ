<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDEK Last-Mile Infrastructure Map</title>

    <!-- Подключаем стили и скрипты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Подключаем плагин для кластеризации точек (Leaflet.markercluster) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #111; }
        #map { width: 100%; height: 100%; }
        
        /* Стили для кнопки скачивания */
        .download-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #00ffcc;
            color: #111;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,255,204,0.3);
            transition: all 0.2s;
        }
        .download-btn:hover { background: #00cc99; transform: translateY(-2px); }

        /* Стили для кастомных текстовых подписей названий ПВЗ */
        .custom-tooltip {
            background: rgba(17, 17, 17, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #fff !important;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            pointer-events: none; /* Чтобы подпись не мешала кликать по точке */
        }

        /* Управляем видимостью подписей через CSS на основе зума карты */
        .leaflet-zoom-animated.custom-tooltip {
            display: none;
        }
        /* Подписи показываются ТОЛЬКО на зуме 14 и выше */
        .leaflet-zoom-14 .custom-tooltip,
        .leaflet-zoom-15 .custom-tooltip,
        .leaflet-zoom-16 .custom-tooltip,
        .leaflet-zoom-17 .custom-tooltip,
        .leaflet-zoom-18 .custom-tooltip {
            display: block !important;
        }
    </style>
</head>
<body>

    <button class="download-btn" id="downloadSample">Скачать образец данных (.csv)</button>
    <div id="map"></div>

    <script>
        // Инициализируем карту
        var map = L.map('map').setView([55.7558, 37.6173], 10);

        // Темная подложка
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        // --- ПУНКТ 4: Граница Москвы (Белая, тонкая) ---
        fetch('moscow_border.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                L.geoJSON(geoJsonData, {
                    style: {
                        color: "#ffffff",      // Чисто белый
                        weight: 1,             // Тонкая изящная линия
                        opacity: 0.8,          // Легкая прозрачность
                        fillColor: "transparent"
                    }
                }).addTo(map);
            }).catch(err => console.error("Ошибка загрузки границы:", err));


        // Инициализируем слой кластеризации (ПУНКТ 3)
        var markersCluster = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 45
        });

        // --- ПУНКТЫ 1, 2, 5, 6: Загрузка и стилизация точек СДЭК ---
        fetch('cdek_points.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                var pointsLayer = L.geoJSON(geoJsonData, {
                    pointToLayer: function (feature, latlng) {
                        var itemType = feature.properties.Type;
                        
                        // ПУНКТ 2 и 5: Ярко-красный для PVZ, желтый для POSTOMAT
                        var markerColor = "#ff0044"; 
                        if (itemType === 'POSTOMAT') {
                            markerColor = "#ffee00";
                        }

                        // ПУНКТ 6: Размер уменьшен на 10% (radius: 4.5 вместо 5)
                        var marker = L.circleMarker(latlng, {
                            radius: 4.5,
                            fillColor: markerColor,
                            color: "#000000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.9
                        });

                        // ПУНКТ 1: Привязываем постоянную подпись с кодом пункта
                        if (feature.properties && feature.properties.Code) {
                            marker.bindTooltip(String(feature.properties.Code), {
                                permanent: true, 
                                direction: 'top',
                                offset: [0, -5],
                                className: 'custom-tooltip'
                            });
                        }

                        return marker;
                    },
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            var code = feature.properties.Code || 'Без названия';
                            var type = feature.properties.Type || 'Не указан';
                            
                            var popup = `
                                <div style="color: #111; font-size: 13px;">
                                    <strong style="font-size: 14px;">${code}</strong><br>
                                    <hr style="border: 0; border-top: 1px solid #eee; margin: 4px 0;">
                                    <span style="color: #666;">Тип объекта:</span> ${type}
                                </div>
                            `;
                            layer.bindPopup(popup);
                        }
                    }
                });

                // Добавляем точки в кластер и на карту
                markersCluster.addLayer(pointsLayer);
                map.addLayer(markersCluster);
            }).catch(err => console.error("Ошибка загрузки точек:", err));

        // Обработка кнопки скачивания
        document.getElementById('downloadSample').addEventListener('click', function() {
            window.location.href = 'cdek_sample_full.csv';
            console.log('Клик зафиксирован, файл отправлен на скачивание');
        });
    </script>
</body>
</html>
