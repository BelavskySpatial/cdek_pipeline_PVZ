<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDEK Last-Mile Infrastructure Map</title>

    <!-- Подключаем стили и скрипты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #111; }
        #map { width: 100%; height: 100%; }
        
        /* Стили для будущей кнопки скачивания (Пункт 3) */
        .download-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #00ffcc;
            color: #111;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,255,204,0.3);
            transition: all 0.2s;
        }
        .download-btn:hover { background: #00cc99; transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- Кнопка скачивания образца данных (Пункт 3) -->
    <button class="download-btn" id="downloadSample">Скачать образец данных (.csv)</button>

    <div id="map"></div>

    <script>
        // Инициализируем карту с центром на Москву
        var map = L.map('map').setView([55.7558, 37.6173], 10);

        // Добавляем темную карту-подложку (LI / B2B стиль)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        // --- ПУНКТ 1: Загружаем границу Москвы ---
        fetch('moscow_border.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                L.geoJSON(geoJsonData, {
                    style: {
                        color: "#ffffff",      // Белая линия контура
                        weight: 1.5,
                        opacity: 0.4,
                        fillColor: "transparent"
                    }
                }).addTo(map);
            }).catch(err => console.error("Ошибка загрузки границы:", err));


        // --- ПУНКТ 2: Загружаем точки с разным отображением ---
        fetch('cdek_points.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                L.geoJSON(geoJsonData, {
                    pointToLayer: function (feature, latlng) {
                        // Читаем тип строго из поля Type
                        var itemType = feature.properties.Type;
                        
                        // По умолчанию используем неоновый бирюзовый для PVZ
                        var markerColor = "#00ffcc"; 
                        
                        // Если тип POSTOMAT — красим в контрастный оранжевый
                        if (itemType === 'POSTOMAT') {
                            markerColor = "#ff9900";
                        }

                        return L.circleMarker(latlng, {
                            radius: 5,
                            fillColor: markerColor,
                            color: "#000000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    // Показываем урезанный набор данных во всплывающем окне
                    onEachFeature: function (feature, layer) {
                        if (feature.properties) {
                            var code = feature.properties.Code || 'Без названия';
                            var type = feature.properties.Type || 'Не указан';
                            
                            // Собираем лаконичный попап (Название, Тип объекта)
                            var popup = `
                                <div style="color: #111; font-size: 13px; font-family: Arial, sans-serif;">
                                    <strong style="font-size: 14px;">${code}</strong><br>
                                    <hr style="border: 0; border-top: 1px solid #eee; margin: 4px 0;">
                                    <span style="color: #666;">Тип объекта:</span> ${type}
                                </div>
                            `;
                            layer.bindPopup(popup);
                        }
                    }
                }).addTo(map);
            }).catch(err => console.error("Ошибка загрузки точек СДЭК:", err));


        // --- ПУНКТ 3 & 4: Обработка клика по кнопке скачивания ---
        document.getElementById('downloadSample').addEventListener('click', function() {
            window.location.href = 'cdek_sample_full.csv';
            console.log('Клик зафиксирован, файл отправлен на скачивание');
        });
    </script>
</body>
</html>
