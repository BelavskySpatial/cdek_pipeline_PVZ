<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDEK Last-Mile Infrastructure Map</title>

    <!-- Подключаем стили и скрипты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Подключаем плагин для кластеризации точек (Leaflet.markercluster) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #111; }
        #map { width: 100%; height: 100%; }
        
        /* Стили для кнопки скачивания */
        .download-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #00ffcc;
            color: #111;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,255,204,0.3);
            transition: all 0.2s;
        }
        .download-btn:hover { background: #00cc99; transform: translateY(-2px); }

        /* Стили для кастомных текстовых подписей названий ПВЗ */
        .custom-tooltip {
            background: rgba(17, 17, 17, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #fff !important;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <button class="download-btn" id="downloadSample">Скачать образец данных (.csv)</button>
    <div id="map"></div>

    <script>
        // Инициализируем карту
        var map = L.map('map').setView([55.7558, 37.6173], 10);

        // Темная подложка
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        // --- Граница Москвы (Белая, тонкая нить) ---
        fetch('moscow_border.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                L.geoJSON(geoJsonData, {
                    style: {
                        color: "#ffffff",
                        weight: 1,
                        opacity: 0.8,
                        fillColor: "transparent"
                    }
                }).addTo(map);
            }).catch(err => console.error("Ошибка загрузки границы:", err));

        // Инициализируем слой кластеризации
        var markersCluster = L.markerClusterGroup({
            showCoverageOnHover: false,
            maxClusterRadius: 45
        });

        var allMarkers = [];

        // --- Загрузка и стилизация точек СДЭК ---
        fetch('cdek_points.geojson')
            .then(res => res.json())
            .then(geoJsonData => {
                var pointsLayer = L.geoJSON(geoJsonData, {
                    pointToLayer: function (feature, latlng) {
                        // Очищаем строку от невидимого мусора и переводим в верхний регистр
                        var rawType = feature.properties.type ? String(feature.properties.type) : '';
                        var cleanType = rawType.replace(/[\s\u200B-\u200D\uFEFF]/g, '').toUpperCase();
                        
                        // По умолчанию ярко-красный для ПВЗ
                        var markerColor = "#ff0044"; 
                        var strokeColor = "#ff0044"; 
                        
                        // Проверяем ОБА варианта написания: POSTAMAT (как в данных) и POSTOMAT
                        if (cleanType.indexOf('POSTAMAT') !== -1 || cleanType.indexOf('POSTOMAT') !== -1) {
                            markerColor = "#ffee00"; // Ярко-желтый
                            strokeColor = "#ffee00"; 
                        }

                        var marker = L.circleMarker(latlng, {
                            radius: 4.5,
                            fillColor: markerColor,
                            color: strokeColor, 
                            weight: 1.5, 
                            opacity: 1,
                            fillOpacity: 0.95
                        });

                        var code = feature.properties.code || 'Без названия';
                        var type = feature.properties.type || 'Не указан';
                        
                        var popupContent = `
                            <div style="color: #111; font-size: 13px;">
                                <strong style="font-size: 14px;">${code}</strong><br>
                                <hr style="border: 0; border-top: 1px solid #eee; margin: 4px 0;">
                                <span style="color: #666;">Тип объекта:</span> ${type}
                            </div>
                        `;
                        marker.bindPopup(popupContent);

                        marker.cdekCode = code;
                        allMarkers.push(marker);

                        return marker;
                    }
                });

                markersCluster.addLayer(pointsLayer);
                map.addLayer(markersCluster);
                
                updateLabelsVisibility();
            }).catch(err => console.error("Ошибка загрузки точек:", err));

        // Функция управления подписями в зависимости от масштаба
        function updateLabelsVisibility() {
            var currentZoom = map.getZoom();
            
            allMarkers.forEach(function(marker) {
                if (currentZoom >= 14) {
                    if (!marker.getTooltip()) {
                        marker.bindTooltip(String(marker.cdekCode), {
                            permanent: true,
                            direction: 'top',
                            offset: [0, -5],
                            className: 'custom-tooltip'
                        });
                    }
                } else {
                    if (marker.getTooltip()) {
                        marker.unbindTooltip();
                    }
                }
            });
        }

        map.on('zoomend', updateLabelsVisibility);

        document.getElementById('downloadSample').addEventListener('click', function() {
            window.location.href = 'cdek_sample_full.csv';
        });
    </script>
</body>
</html>
